services:
  postgres:
    image: postgres:17-alpine
    container_name: grpcsso-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: grpcsso
      POSTGRES_USER: grpcsso_user
      POSTGRES_PASSWORD: grpcsso_12345
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U grpcsso_user -d grpcsso" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: grpcsso-redis
    restart: unless-stopped
    entrypoint: >
      sh -c "echo 'user default off' > /tmp/users.acl &&
             echo 'user grpcsso_user on >grpcsso_12345 ~* +@all' >> /tmp/users.acl &&
             exec redis-server --aclfile /tmp/users.acl"
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli -u redis://grpcsso_user:grpcsso_12345@localhost:6379 ping" ]
      interval: 5s
      timeout: 5s
      retries: 5


volumes:
  postgres_data:

